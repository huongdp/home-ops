---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: small-hack
spec:
  interval: 1h
  url: https://codeberg.org/api/packages/open-engineering/helm

---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bitwarden-eso
spec:
  interval: 1h
  chart:
    spec:
      chart: bitwarden-eso-provider
      version: 1.6.4
      sourceRef:
        kind: HelmRepository
        name: small-hack
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    image:
      repository: docker.io/jessebot/bweso
      tag: 1.5.0
    bitwarden_eso_provider:
      create_cluster_secret_store: false
      auth:
        existingSecret: "bitwarden-eso"
