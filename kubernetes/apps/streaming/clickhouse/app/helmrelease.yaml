---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: clickhouse
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: clickhouse
  values:
    controllers:
      clickhouse:
        containers:
          app:
            image:
              repository: clickhouse/clickhouse-server
              tag: 26.3.9.8-alpine@sha256:b98554227ed543d21d2cd632df77fb2060454a2caeab47929fa6118c9f8bbe2f
              pullPolicy: IfNotPresent
            env:
              CLICKHOUSE_HTTP_PORT: &httpPort 8123
              CLICKHOUSE_TCP_PORT: &tcpPort 9000
              CLICKHOUSE_LOGGER_CONSOLE: "true"
              CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
            probes:
              liveness: &probe
                enabled: true
                type: HTTP
                path: /?query=SELECT+1
              readiness: *probe
              startup:
                <<: *probe
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                memory: 1024Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 10.10.1.130
        externalTrafficPolicy: Local
        ports:
          http:
            port: *httpPort
          tcp:
            port: *tcpPort

    persistence:
      data:
        existingClaim: clickhouse
        globalMounts:
          - path: /var/lib/clickhouse
      tmp:
        type: emptyDir
      logs:
        type: emptyDir
        globalMounts:
          - path: /var/log
      config:
        type: configMap
        identifier: config
        globalMounts:
          - path: /etc/clickhouse-server/config.d/logging.xml
            subPath: config.xml
          - path: /etc/clickhouse-server/users.d/logging.xml
            subPath: users.xml

    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${CLUSTER_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: http

    configMaps:
      config:
        enabled: true
        data:
          # language=xml
          config.xml: |
            <clickhouse>
                <logger>
                    <level>warning</level>
                    <console>true</console>
                </logger>

                <listen_host>0.0.0.0</listen_host>

                <!-- Stop all the unnecessary logging -->
                <query_thread_log remove="remove"/>
                <query_log remove="remove"/>
                <text_log remove="remove"/>
                <trace_log remove="remove"/>
                <metric_log remove="remove"/>
                <asynchronous_metric_log remove="remove"/>
                <session_log remove="remove"/>
                <part_log remove="remove"/>
            </clickhouse>
          # language=xml
          users.xml: |
            <clickhouse>
                <profiles>
                    <default>
                        <log_queries>0</log_queries>
                        <log_query_threads>0</log_query_threads>
                    </default>
                </profiles>
            </clickhouse>
