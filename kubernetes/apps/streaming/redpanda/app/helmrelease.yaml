apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: streaming-redpanda
spec:
  interval: 5m
  chart:
    spec:
      chart: operator
      version: 25.3.2
      sourceRef:
        kind: HelmRepository
        name: streaming-redpanda
  install:
    crds: CreateReplace
    remediation:
      retries: -1
  upgrade:
    crds: CreateReplace
    remediation:
      retries: -1
  values:
    crds:
      enabled: true
      experimental: true
