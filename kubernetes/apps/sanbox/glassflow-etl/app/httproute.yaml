---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: glassflow-etl-ui
  namespace: sanbox
spec:
  hostnames:
    - "{{ .Release.Name }}.${CLUSTER_DOMAIN}"
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: https
  rules:
    - backendRefs:
        - name: glassflow-etl-ui
          namespace: sanbox
          port: 8080
      matches:
        - path:
            type: PathPrefix
            value: /
