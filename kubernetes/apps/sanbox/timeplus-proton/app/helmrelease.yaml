apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: timeplus-proton
spec:
  interval: 5m
  chart:
    spec:
      chart: timeplus-proton
      version: 0.5.13
      sourceRef:
        kind: HelmRepository
        name: timeplus-proton
  values:
    resources:
      limits:
        cpu: '4'
        memory: '8Gi'
      requests:
        cpu: '2'
        memory: 4Gi

    storage:
      className: openebs-hostpath
      size: 10Gi
      selector: null
