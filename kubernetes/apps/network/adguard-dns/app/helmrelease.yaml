---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: adguard-dns
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: adguard-dns
  maxHistory: 15
  install:
    remediation:
      retries: 3
    crds: CreateReplace
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
    crds: CreateReplace
  values:
    fullnameOverride: adguard-dns
    logLevel: info
    interval: 2m
    provider:
      name: webhook
      webhook:
        image:
          repository: ghcr.io/muhlba91/external-dns-provider-adguard
          tag: v11.1.1
        env:
          - name: DRY_RUN
            value: "false"
          - name: LOG_LEVEL
            value: "info"
          - name: ADGUARD_URL
            valueFrom:
              secretKeyRef:
                name: &secret adguard-dns-secret
                key: ADGUARD_URL
          - name: ADGUARD_USER
            valueFrom:
              secretKeyRef:
                name: *secret
                key: ADGUARD_USER
          - name: ADGUARD_PASSWORD
            valueFrom:
              secretKeyRef:
                name: *secret
                key: ADGUARD_PASSWORD
    extraArgs:
      - --ignore-ingress-tls-spec
      - --crd-source-kind=DNSEndpoint
      - --webhook-provider-url=http://localhost:8888
    policy: sync
    sources:
      - gateway-httproute
      - service
    registry: noop
    domainFilters:
      - ${CLUSTER_DOMAIN}
    serviceMonitor:
      enabled: true
    podAnnotations:
      secret.reloader.stakater.com/reload: *secret
